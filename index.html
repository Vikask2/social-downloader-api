<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Video Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#f4fff7;color:#111}
.container{width:90%;max-width:1200px;margin:auto}.hero{padding:100px 0;text-align:center;background:linear-gradient(135deg,#ebfff0,#ffffff)}
.badge{display:inline-block;padding:12px 22px;border-radius:50px;background:#e4ffeb;color:#0f9d58;font-size:14px;font-weight:600;margin-bottom:30px}
.hero h1{font-size:64px;font-weight:800;margin-bottom:20px}.green{color:#0f9d58}
.hero p{max-width:800px;margin:auto;color:#555;font-size:18px;line-height:1.8}
.social-icons{display:flex;justify-content:center;gap:20px;margin:40px 0;flex-wrap:wrap}
.icon{width:75px;height:75px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff}
.instagram{background:linear-gradient(135deg,#feda75,#d62976,#4f5bd5)}.youtube{background:#ff0000}.tiktok{background:#000}.facebook{background:#1877f2}.twitter{background:#111}
.download-box{background:#fff;padding:35px;border-radius:25px;max-width:950px;margin:auto;box-shadow:0 10px 40px rgba(0,0,0,.08)}
.input-group{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px}
input,select{flex:1;padding:20px;border-radius:16px;border:2px solid #d9f5e0;font-size:16px;outline:none;background:#fff}
button{padding:20px 35px;border:none;border-radius:16px;background:#0f9d58;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.status{margin-top:15px;font-size:14px;font-weight:500;color:#0f9d58;line-height:1.7;word-break:break-word}
.hidden{display:none}
@media(max-width:768px){.hero h1{font-size:40px}.input-group{flex-direction:column}button{width:100%}}
</style>
</head>
<body>
<section class="hero">
<div class="container">
<div class="badge">⚡ Fast • Secure • Unlimited Downloads</div>
<h1>Download <span class="green">Videos</span> In Seconds</h1>
<p>Download Instagram, YouTube, TikTok, Facebook and X videos instantly.</p>
<div class="social-icons">
<div class="icon instagram"><i class="fab fa-instagram"></i></div>
<div class="icon youtube"><i class="fab fa-youtube"></i></div>
<div class="icon tiktok"><i class="fab fa-tiktok"></i></div>
<div class="icon facebook"><i class="fab fa-facebook-f"></i></div>
<div class="icon twitter"><i class="fab fa-x-twitter"></i></div>
</div>
<div class="download-box">
<div class="input-group">
<input type="text" id="videoUrl" placeholder="Paste video URL here...">
<button onclick="fetchQualities()">Fetch Qualities</button>
</div>
<div class="input-group hidden" id="qualitySection">
<select id="quality"></select>
<button id="downloadBtn" onclick="downloadVideo()">Download</button>
</div>
<div class="status" id="status"></div>
</div>
</div>
</section>
<script>
async function fetchQualities(){
const url=document.getElementById('videoUrl').value.trim();
const status=document.getElementById('status');
const qualitySelect=document.getElementById('quality');
const qualitySection=document.getElementById('qualitySection');
if(!url){alert('Please paste a video URL');return;}
status.innerText='Fetching available qualities...';
qualitySelect.innerHTML='';
try{
const response=await fetch(`https://social-downloader-api-production.up.railway.app/formats?url=${encodeURIComponent(url)}`);
const data=await response.json();
if(!response.ok){
status.innerText=data.details || data.error || 'Unable to fetch formats';
return;
}
if(!data.qualities||data.qualities.length===0){
status.innerText='No quality formats found.';
return;
}
data.qualities.forEach(q=>{
const option=document.createElement('option');
option.value=q;
option.textContent=`${q}p`;
qualitySelect.appendChild(option);
});
qualitySection.classList.remove('hidden');
status.innerText='Select available quality and click download.';
}catch(error){
console.error(error);
status.innerText=error.message;
}
}
function downloadVideo(){
const url=document.getElementById('videoUrl').value.trim();
const quality=document.getElementById('quality').value;
const status=document.getElementById('status');
status.innerText='Preparing download...';
const apiUrl=`https://social-downloader-api-production.up.railway.app/download?url=${encodeURIComponent(url)}&quality=${quality}`;
window.open(apiUrl,'_blank');
}
</script>
</body>
</html>
